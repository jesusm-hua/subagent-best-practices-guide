<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#111A34"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1330" cy="140" r="180" fill="#1D4ED8" opacity="0.12"/>
  <circle cx="220" cy="760" r="220" fill="#10B981" opacity="0.08"/>

  <text x="120" y="150" fill="#E5EEF9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Subagent Best Practices Guide</text>
  <rect x="120" y="182" width="340" height="6" rx="3" fill="url(#accent)"/>
  <text x="120" y="255" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800">Codex CLI · Claude Code</text>
  <text x="120" y="330" fill="#D6E4FF" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="700">Subagent 架构 · 多 Agent 开发工作流</text>
  <text x="120" y="405" fill="#9FB2D4" font-family="Inter, Arial, sans-serif" font-size="28">40 条资料精读、综合方法论、3 篇教程、技术架构 SVG</text>

  <g filter="url(#shadow)">
    <rect x="110" y="500" width="290" height="150" rx="24" fill="#111827" stroke="#334155"/>
    <text x="145" y="555" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Runtime Contract</text>
    <text x="145" y="600" fill="#E5EEF9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Session Isolation</text>
    <text x="145" y="635" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="20">cleanup · lifecycle · auth</text>

    <rect x="450" y="500" width="290" height="150" rx="24" fill="#111827" stroke="#334155"/>
    <text x="485" y="555" fill="#6EE7B7" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Topology Layer</text>
    <text x="485" y="600" fill="#E5EEF9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Subagents & Teams</text>
    <text x="485" y="635" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="20">roles · routing · delegation</text>

    <rect x="790" y="500" width="290" height="150" rx="24" fill="#111827" stroke="#334155"/>
    <text x="825" y="555" fill="#C4B5FD" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Control-Flow</text>
    <text x="825" y="600" fill="#E5EEF9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Plan → Execute → Review</text>
    <text x="825" y="635" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="20">parallel · gather · checkpoints</text>

    <rect x="1130" y="500" width="330" height="150" rx="24" fill="#111827" stroke="#334155"/>
    <text x="1165" y="555" fill="#FCA5A5" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Worker Profile</text>
    <text x="1165" y="600" fill="#E5EEF9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Tools · Models · Permissions</text>
    <text x="1165" y="635" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="20">worktree · hooks · safety</text>
  </g>

  <path d="M400 575 L450 575" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M740 575 L790 575" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1080 575 L1130 575" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L12,6 z" fill="#64748B"/>
    </marker>
  </defs>

  <text x="120" y="805" fill="#7DD3FC" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">V2 in progress:</text>
  <text x="255" y="805" fill="#C7D2FE" font-family="Inter, Arial, sans-serif" font-size="20">Reddit top10 practices · README 首页导览升级 · GitHub public refresh</text>
</svg>