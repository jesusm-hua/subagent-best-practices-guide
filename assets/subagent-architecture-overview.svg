<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .panel { fill: #121933; stroke: #2c3b6a; stroke-width: 2; rx: 20; }
      .panel2 { fill: #0f1730; stroke: #35508f; stroke-width: 2; rx: 18; }
      .title { fill: #f3f6ff; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 32px; font-weight: 700; }
      .subtitle { fill: #aab8e6; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 16px; }
      .h2 { fill: #ffffff; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 22px; font-weight: 700; }
      .body { fill: #d9e2ff; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 16px; }
      .small { fill: #9fb0e3; font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size: 14px; }
      .chip { fill: #1b2750; stroke: #4d6dd1; stroke-width: 1.5; rx: 12; }
      .accent { fill: #7aa2ff; }
      .green { fill: #38d39f; }
      .orange { fill: #ffb454; }
      .pink { fill: #ff7ab6; }
      .line { stroke: #6f8fe8; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #4e659f; stroke-width: 2; stroke-dasharray: 8 8; fill: none; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#6f8fe8" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>

  <text x="70" y="72" class="title">Subagent 最佳实践技术架构图</text>
  <text x="70" y="104" class="subtitle">面向 Codex / Claude Code / OpenClaw 的通用多代理工程骨架：先合同，后拓扑，再流程，再角色。</text>

  <rect class="panel" x="60" y="140" width="1480" height="180"/>
  <text x="90" y="180" class="h2">Layer 1 · Runtime Contract</text>
  <text x="90" y="214" class="body">定义谁能 spawn、权限如何收口、结果怎样回传、何时超时回收、哪些动作必须人工确认。</text>

  <rect class="chip" x="90" y="240" width="180" height="42"/>
  <text x="112" y="267" class="body">Spawn Authority</text>
  <rect class="chip" x="290" y="240" width="180" height="42"/>
  <text x="330" y="267" class="body">Permissions</text>
  <rect class="chip" x="490" y="240" width="180" height="42"/>
  <text x="532" y="267" class="body">Context Input</text>
  <rect class="chip" x="690" y="240" width="180" height="42"/>
  <text x="741" y="267" class="body">Result Push</text>
  <rect class="chip" x="890" y="240" width="180" height="42"/>
  <text x="938" y="267" class="body">Timeout</text>
  <rect class="chip" x="1090" y="240" width="180" height="42"/>
  <text x="1123" y="267" class="body">Audit Trail</text>
  <rect class="chip" x="1290" y="240" width="180" height="42"/>
  <text x="1338" y="267" class="body">Human Gate</text>

  <rect class="panel" x="60" y="350" width="420" height="270"/>
  <text x="90" y="392" class="h2">Layer 2 · Topology</text>
  <text x="90" y="424" class="small">复杂度按需升级，不要一上来就 swarm。</text>
  <rect class="panel2" x="92" y="450" width="150" height="54"/>
  <text x="134" y="483" class="body">Single Agent</text>
  <rect class="panel2" x="92" y="520" width="150" height="54"/>
  <text x="117" y="553" class="body">Main + Worker</text>
  <rect class="panel2" x="260" y="450" width="180" height="54"/>
  <text x="278" y="483" class="body">Implementer + Reviewer</text>
  <rect class="panel2" x="260" y="520" width="180" height="54"/>
  <text x="299" y="553" class="body">Manager-led Team</text>
  <path class="line" d="M170 504 C170 515,170 515,170 520"/>
  <path class="line" d="M242 477 C250 477,252 477,260 477"/>
  <path class="line" d="M350 504 C350 515,350 515,350 520"/>

  <rect class="panel" x="520" y="350" width="520" height="270"/>
  <text x="550" y="392" class="h2">Layer 3 · Control Flow</text>
  <text x="550" y="424" class="small">标准阶段：Explore → Plan → Implement → Review → Validate → Handoff</text>
  <rect class="panel2" x="550" y="462" width="110" height="52"/>
  <text x="575" y="494" class="body">Explore</text>
  <rect class="panel2" x="690" y="462" width="90" height="52"/>
  <text x="717" y="494" class="body">Plan</text>
  <rect class="panel2" x="810" y="462" width="120" height="52"/>
  <text x="835" y="494" class="body">Implement</text>
  <rect class="panel2" x="550" y="540" width="100" height="52"/>
  <text x="579" y="572" class="body">Review</text>
  <rect class="panel2" x="680" y="540" width="110" height="52"/>
  <text x="704" y="572" class="body">Validate</text>
  <rect class="panel2" x="820" y="540" width="150" height="52"/>
  <text x="845" y="572" class="body">Handoff</text>
  <path class="line" d="M660 488 L690 488"/>
  <path class="line" d="M780 488 L810 488"/>
  <path class="line" d="M870 514 C870 530,870 530,870 540"/>
  <path class="line" d="M820 566 L790 566"/>
  <path class="line" d="M680 566 L650 566"/>

  <rect class="panel" x="1080" y="350" width="460" height="270"/>
  <text x="1110" y="392" class="h2">Layer 4 · Worker Profile</text>
  <text x="1110" y="424" class="small">不要只有角色名，要有明确合同。</text>
  <text x="1110" y="470" class="body">• role / goal / scope</text>
  <text x="1110" y="505" class="body">• allowed tools / permissions</text>
  <text x="1110" y="540" class="body">• context inputs / output contract</text>
  <text x="1110" y="575" class="body">• timeout / retry / escalation</text>

  <rect class="panel" x="60" y="660" width="710" height="250"/>
  <text x="90" y="702" class="h2">推荐开发闭环</text>
  <text x="90" y="734" class="body">先把单 agent 的 plan → execute → validate 跑稳，再引入 researcher / reviewer / critic。</text>
  <path class="line" d="M140 790 L280 790"/>
  <path class="line" d="M340 790 L480 790"/>
  <path class="line" d="M540 790 L680 790"/>
  <circle cx="120" cy="790" r="18" class="accent"/>
  <text x="108" y="796" class="body">1</text>
  <text x="90" y="835" class="body">Plan</text>
  <circle cx="320" cy="790" r="18" class="green"/>
  <text x="308" y="796" class="body">2</text>
  <text x="278" y="835" class="body">Execute</text>
  <circle cx="520" cy="790" r="18" class="orange"/>
  <text x="508" y="796" class="body">3</text>
  <text x="485" y="835" class="body">Validate</text>
  <circle cx="720" cy="790" r="18" class="pink"/>
  <text x="708" y="796" class="body">4</text>
  <text x="670" y="835" class="body">Summarize</text>

  <rect class="panel" x="810" y="660" width="730" height="250"/>
  <text x="840" y="702" class="h2">治理与护栏</text>
  <text x="840" y="742" class="body">• 同一代码区单写者原则</text>
  <text x="840" y="777" class="body">• hooks / scripts / CI 承担自动 guardrails</text>
  <text x="840" y="812" class="body">• reviewer / critic 负责 review gate</text>
  <text x="840" y="847" class="body">• 重要产物必须留痕：artifacts / logs / decisions</text>
  <text x="840" y="882" class="body">• 高风险动作默认人工确认</text>

  <path class="dash" d="M270 320 C270 335,270 340,270 350"/>
  <path class="dash" d="M780 320 C780 335,780 340,780 350"/>
  <path class="dash" d="M1310 320 C1310 335,1310 340,1310 350"/>

  <text x="60" y="950" class="small">Key idea: 不要把 subagent 当“多开几个聊天框”；要把角色、权限、流程、验证、留痕、恢复做成系统能力。</text>
</svg>